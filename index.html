<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galactic Trading Post</title>
    <meta name="theme-color" content="#081226" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Galactic Trading Post" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icons/icon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <div id="toastStack" class="toast-stack" aria-live="polite" aria-atomic="false"></div>
    <button id="openHelpBtn" class="help-fab" type="button" aria-haspopup="dialog" aria-controls="helpModal">Help</button>

    <main class="app">
      <section class="hub panel">
        <div class="hub-head">
          <div>
            <p class="eyebrow">Spaceport Management Sim</p>
            <h1>Galactic Trading Post</h1>
            <p class="section-subtitle">Run Sol Nexus like the busiest port in the sector.</p>
          </div>
        </div>
        <div id="headerStats" class="header-stats"></div>
      </section>

      <section class="panel" aria-labelledby="spaceportTitle">
        <div class="section-head">
          <div>
            <h2 id="spaceportTitle">Spaceport Hub</h2>
            <p class="section-subtitle">Open a location to manage one part of your trading empire.</p>
          </div>
        </div>
        <div id="hubLocations" class="hub-grid"></div>
      </section>
    </main>

    <div id="sectionModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="sectionModalTitle">
      <div class="modal-card section-modal-card">
        <div class="section-head sticky-head">
          <div>
            <p id="sectionModalKicker" class="eyebrow">Spaceport</p>
            <h2 id="sectionModalTitle">Location</h2>
          </div>
          <button id="closeSectionModalBtn" class="btn secondary" type="button">Close</button>
        </div>
        <div id="sectionModalBody" class="section-modal-body"></div>
      </div>
    </div>

    <div id="tradeModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="tradeTitle">
      <div class="modal-card trade-modal-card">
        <div class="section-head sticky-head">
          <div>
            <p class="eyebrow">Dispatch Office</p>
            <h2 id="tradeTitle">Trade Mission</h2>
          </div>
          <button id="closeTradeModalBtn" class="btn secondary" type="button">Close</button>
        </div>
        <div id="tradePlannerContent" class="section-modal-body"></div>
      </div>
    </div>

    <div id="awayModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="awayTitle">
      <div class="modal-card compact-modal-card">
        <div class="section-head">
          <div>
            <p class="eyebrow">Station Report</p>
            <h2 id="awayTitle">Away Summary</h2>
          </div>
        </div>
        <ul id="awaySummaryList" class="summary-list"></ul>
        <button id="closeAwayModalBtn" class="btn" type="button">Continue</button>
      </div>
    </div>

    <div id="helpModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="helpTitle">
      <div class="modal-card trade-modal-card">
        <div class="section-head sticky-head">
          <div>
            <p class="eyebrow">Operations Briefing</p>
            <h2 id="helpTitle">How To Play</h2>
          </div>
          <button id="closeHelpModalBtn" class="btn secondary" type="button">Close</button>
        </div>
        <div id="helpContent" class="section-modal-body stack"></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
